<!--Junior Project - Chess-->
<!--Cayden Dysome-->
<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">

        <!-- Bootstrap -->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

        <!-- CSS -->
        <link rel="stylesheet" href="styles.css">

        <!-- Javascript -->
        <script src="script.js"></script>
    </head>

    <body>
        <!-- Intro Screen -->
        <div id="intro" class="intro-screen">
            <div class="intro-content">
            <!-- Title and images -->
                <div class="d-flex justify-content-between align-items-center">
                    <img src="images/wK.png" alt="white king">
                    <h1 class="intro-title text-white">CHESS</h1>
                    <img src="images/wQ.png" alt="white queen">
                </div>

                <!-- Subtitle -->
                <p class="intro-subtitle">A JUNIOR PROJECT CREATED BY CAYDEN DYSOME</p>

                <!-- Start button -->
                <button id="startBtn" class="start-button">Start Game</button>
            </div>
        </div>

        <!-- Intro Screen -->
        <div id="gameMode" class="gameModeScreen">
            <div class="gameModeScreen-content">
            <!-- Title and images -->
                <div class="d-flex justify-content-between align-items-center">
                    <img src="images/wK.png" alt="white king">
                    <h1 class="gameModeScreen-title text-white">Game Mode?</h1>
                    <img src="images/wQ.png" alt="white queen">
                </div>

                <!-- Subtitle -->
                <p class="gameModeScreen-subtitle">I only have player vs player btw</p>

                <!-- Start button -->
                <button id="pvpBtn" class="pvp-button">PLayer vs Player</button>
            </div>
        </div>

        <!-- Main Game -->
        <div id="Home" class="container mt-4 p-3 rounded text-center border border-black border-5" style="display: none;">

            <!-- Board and Past Moves Row -->
            <div class="row mt-4">
                <!-- Left side: Chess Board -->
                <div class="col-md-6 p-2">
                    <div id="board"></div>
                </div>

                <!-- Right side: Past Moves -->
                <div id="pastMovesMain" class="col-md-6 p-2">
                    <div id="pastMovesUI">
                        <h3 class="past-moves-title">Past Moves</h3>
                        <div class="move-log"></div>
                    </div>
                </div>
            </div>

            <!-- Controls and Status Row -->
            <div class="row mt-4">
                <!-- Left side: Control Buttons -->
                <div id="leftUI" class="col-md-6 p-3 bg-black text-center border border-black border-5">
                    <button id="backBtn">Undo</button>
                    <button id="resetBtn">Reset</button>
                </div>

            <!-- Right side: Current Player -->
            <div id="rightUI" class="col-md-6 p-3 bg-black text-center border border-black border-5">
                <div class="current-player-container">
                    <span class="player-label">PLAYER:</span>
                    <span id="currentPlayer" class="player-value">White or Black</span>
                </div>
            </div>
            </div>
        </div>
  </body>
</html>
